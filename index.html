<!DOCTYPE html>
<html>
<head>
  <title>KGOSI AI Studio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #d4af37;
      margin-top: 20px;
    }

    #chat {
      width: 90%;
      max-width: 700px;
      height: 60vh;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 15px;
      background: #fafafa;
      margin-top: 10px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #d4af37;
      color: white;
      margin-left: auto;
    }

    .ai {
      background: #eee;
      color: black;
      margin-right: auto;
    }

    #inputBox {
      width: 90%;
      max-width: 700px;
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #d4af37;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .tools {
      margin: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .tool-btn {
      background: white;
      border: 1px solid #d4af37;
      color: #d4af37;
    }
  </style>
</head>

<body>

<h1>KGOSI AI Studio ✨</h1>

<div id="chat"></div>

<div class="tools">
  <button class="tool-btn" onclick="quick('Write a catchy Amapiano hook')">🎵 Hook</button>
  <button class="tool-btn" onclick="quick('Create a viral TikTok caption')">📱 Caption</button>
  <button class="tool-btn" onclick="quick('Reply to a fan DM in a cool way')">💬 DM Reply</button>
  <button class="tool-btn" onclick="quick('Give me a music marketing strategy')">📈 Marketing</button>
</div>

<div id="inputBox">
  <input id="input" placeholder="Ask KGOSI AI..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send(msg=null) {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = msg || input.value;
  if (!message) return;

  chat.innerHTML += `<div class="msg user">${message}</div>`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message})
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;

  chat.scrollTop = chat.scrollHeight;
  input.value = "";
}

function quick(text) {
  send(text);
}
</script>

</body>
</html>
